{% extends 'base.html' %}
{% block title %}Login — ShopApp{% endblock %}
{% block content %}
<div style="max-width:420px; margin:3rem auto;">
  <div class="card">
    <h2 class="card-title" style="font-size:1.6rem; margin-bottom:0.25rem;">Sign In</h2>
    <p style="color:var(--muted); font-size:0.85rem; margin-bottom:1.5rem;">Enter your role and numeric ID to continue.</p>
    <form method="post">
      <div class="form-group">
        <label>Role</label>
        <select name="role" required>
          <option value="customer">Customer</option>
          <option value="staff">Staff Member</option>
        </select>
      </div>
      <div class="form-group">
        <label>Your ID</label>
        <input type="text" name="id" placeholder="e.g. 1" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
    </form>
    <div style="text-align:center; margin-top:1.25rem; font-size:0.85rem; color:var(--muted);">
      New customer? <a href="{{ url_for('register') }}">Create account</a>
    </div>
  </div>
</div>
{% endblock %}
