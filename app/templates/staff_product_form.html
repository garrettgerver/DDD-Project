{% extends 'base.html' %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product — ShopApp{% endblock %}
{% block content %}
<a href="{{ url_for('staff_products') }}" style="color:var(--muted); font-size:0.85rem;">← Back to products</a>
<div style="max-width:600px; margin:2rem auto;">
  <h1 class="page-title" style="margin-bottom:1.5rem;">{{ 'Edit' if product else 'Add New' }} Product</h1>
  <div class="card">
    <form method="post">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group" style="grid-column:1/-1;">
          <label>Product Name *</label>
          <input type="text" name="name" value="{{ product.name if product }}" required/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" name="category" value="{{ product.category if product }}"/>
        </div>
        <div class="form-group">
          <label>Price *</label>
          <input type="number" name="price" step="0.01" min="0" value="{{ product.price if product }}" required/>
        </div>
        <div class="form-group">
          <label>Type</label>
          <input type="text" name="type" value="{{ product.type if product }}"/>
        </div>
        <div class="form-group">
          <label>Brand</label>
          <input type="text" name="brand" value="{{ product.brand if product }}"/>
        </div>
        <div class="form-group">
          <label>Size</label>
          <input type="text" name="size" value="{{ product.size if product }}"/>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>Description</label>
          <textarea name="description">{{ product.description if product }}</textarea>
        </div>
      </div>
      <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
        <button type="submit" class="btn btn-primary">{{ 'Save Changes' if product else 'Add Product' }}</button>
        <a href="{{ url_for('staff_products') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
