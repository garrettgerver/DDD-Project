{% extends 'base.html' %}
{% block title %}Manage Stock — ShopApp{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Manage Stock</h1>
</div>

<div style="display:grid; grid-template-columns:1fr 340px; gap:2rem; align-items:start;">
  <div class="card" style="padding:0; overflow:hidden;">
    <table>
      <thead><tr><th>Product</th><th>Warehouse</th><th>Quantity</th></tr></thead>
      <tbody>
        {% for s in stock %}
        <tr>
          <td>{{ s.product_name }}</td>
          <td style="color:var(--muted); font-size:0.85rem;">{{ s.warehouse_address }}</td>
          <td>
            <span style="color: {% if s.qnum > 10 %}var(--success){% elif s.qnum > 0 %}var(--accent){% else %}var(--danger){% endif %}; font-weight:600;">
              {{ s.qnum }}
            </span>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="3" style="text-align:center; color:var(--muted); padding:2rem;">No stock records yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div class="card">
    <h3 class="card-title">Add Stock</h3>
    <form method="post" action="{{ url_for('staff_add_stock') }}">
      <div class="form-group">
        <label>Product</label>
        <select name="product_id" required>
          <option value="">— Select —</option>
          {% for p in products %}
          <option value="{{ p.product_id }}">{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Warehouse</label>
        <select name="warehouse_id" required>
          <option value="">— Select —</option>
          {% for w in warehouses %}
          <option value="{{ w.warehouse_id }}">{{ w.address }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Quantity to Add</label>
        <input type="number" name="quantity" min="1" placeholder="e.g. 50" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Add to Stock</button>
    </form>
  </div>
</div>
{% endblock %}
