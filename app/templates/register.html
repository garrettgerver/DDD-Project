{% extends 'base.html' %}
{% block title %}Register — ShopApp{% endblock %}
{% block content %}
<div style="max-width:420px; margin:3rem auto;">
  <div class="card">
    <h2 class="card-title" style="font-size:1.6rem;">Create Account</h2>
    <p style="color:var(--muted); font-size:0.85rem; margin-bottom:1.5rem;">You'll receive a customer ID to log in with.</p>
    <form method="post">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Jane Doe" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
    </form>
    <div style="text-align:center; margin-top:1.25rem; font-size:0.85rem; color:var(--muted);">
      Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </div>
  </div>
</div>
{% endblock %}
